apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.hpa.name }}
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: servicedemo-api      # Debe coincidir con el nombre del Deployment
  minReplicas: {{ .Values.hpa.minReplicas }}               # Mínimo de pods siempre activos
  maxReplicas: {{ .Values.hpa.maxReplicas }}               # Máximo de pods bajo carga
  metrics:
    # Escala por CPU
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50   # Escala cuando CPU supere 70% del request

    # Escala por Memoria
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80   # Escala cuando Memoria supere 80% del request