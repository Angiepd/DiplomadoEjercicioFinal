# ============================================================
# AZURE DEVOPS CI/CD PIPELINE — con Helm (QA + PROD)
# ============================================================
# Flujo:
#   - main → CI → Docker → Deploy QA (automático)  → Deploy PROD (aprobación manual)
# ============================================================

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md
      - docs/**
      - '*.md'

pr: none

# ─── Variables globales ─────────────────────────────────────
variables:
  acrName: 'acrarquitecturamaestria'
  acrLoginServer: 'acrarquitecturamaestria.azurecr.io'
  imageName: 'reposervicedemo'
  aksResourceGroup: 'miPrimerk8s-rg'
  aksClusterName: 'MiPrimerAks-aks'
  dotnetVersion: '9.0.x'
  solutionFile: '**/*.sln*'
  projectFile: 'src/ServiceDemo.API/ServiceDemo.API.csproj'
  imageTag: '$(Build.BuildId)'
  helmChartPath: './servicedemo'
  helmReleaseName: 'servicedemo'
  # ─── Namespaces por ambiente ───
  k8sNamespaceQA: 'servicedemo-qa'
  k8sNamespaceProd: 'servicedemo'
  k8sPortQA: 81

# ─── Pool de agentes ────────────────────────────────────────
pool:
  name: 'agentlinuxjm'

# ============================================================
# STAGES
# ============================================================
stages:
  # ============================================================
  # STAGE 1: CI - Build y Test
  # ============================================================
  - stage: CI
    displayName: '🔨 Build & Test'
    jobs:
      - job: BuildAndTest
        displayName: 'Compilar y ejecutar pruebas'
        steps:

          - task: UseDotNet@2
            displayName: 'Instalar .NET SDK $(dotnetVersion)'
            inputs:
              version: $(dotnetVersion)
              includePreviewVersions: false

          - task: DotNetCoreCLI@2
            displayName: 'Restaurar paquetes NuGet'
            inputs:
              command: 'restore'
              projects: '$(solutionFile)'

          - task: DotNetCoreCLI@2
            displayName: 'Compilar (Release)'
            inputs:
              command: 'build'
              projects: '$(solutionFile)'
              arguments: '--configuration Release --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Ejecutar pruebas'
            inputs:
              command: 'test'
              projects: 'tests/**/*Tests.csproj'
              arguments: '--configuration Release --no-build --collect:"XPlat Code Coverage" --logger trx'
            continueOnError: false

          - task: PublishCodeCoverageResults@2
            displayName: 'Publicar cobertura de código'
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/**/coverage.cobertura.xml'
            condition: always()

          - task: DotNetCoreCLI@2
            displayName: 'Publicar artefacto .NET'
            inputs:
              command: 'publish'
              publishWebProjects: true
              projects: '$(projectFile)'
              arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)/app'
              zipAfterPublish: false

          - task: PublishBuildArtifacts@1
            displayName: 'Subir artefacto al pipeline'
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)'
              artifactName: 'drop'

  # ============================================================
  # STAGE 2: BUILD DOCKER + PUSH A ACR
  # ============================================================
  - stage: Docker
    displayName: '🐳 Docker Build & Push'
    dependsOn: CI
    condition: succeeded()
    jobs:
      - job: DockerBuildPush
        displayName: 'Construir imagen ARM64 y subir a ACR'
        steps:

          - task: Docker@2
            displayName: 'Login a ACR'
            inputs:
              command: 'login'
              containerRegistry: 'SCArquitecturaSoftware'

          - task: CmdLine@2
            displayName: 'Build y Push imagen ARM64'
            inputs:
              script: |
                docker buildx use multiarch
                docker buildx build \
                  --platform linux/arm64 \
                  --push \
                  -t $(acrLoginServer)/$(imageName):$(imageTag) \
                  -t $(acrLoginServer)/$(imageName):latest \
                  -f Dockerfile .

          - bash: |
              echo "##vso[task.setvariable variable=IMAGE_TAG;isOutput=true]$(imageTag)"
            name: setImageTag
            displayName: 'Exportar tag de imagen'

  # ============================================================
  # STAGE 3: DEPLOY A QA (rama develop - automático)
  # ============================================================
  - stage: DeployQA
    displayName: '🧪 Deploy a QA (Helm)'
    dependsOn: Docker
    condition: succeeded()
    jobs:
      - deployment: HelmDeployQA
        displayName: 'Helm upgrade --install (QA)'
        environment: 'QA'
        strategy:
          runOnce:
            deploy:
              steps:

                - checkout: self

                - task: CmdLine@2
                  displayName: 'Instalar Helm (si no existe)'
                  inputs:
                    script: |
                      if ! command -v helm &> /dev/null; then
                        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
                      fi
                      helm version

                - task: AzureCLI@2
                  displayName: 'Obtener credenciales AKS'
                  inputs:
                    azureSubscription: 'SCDeploy'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group $(aksResourceGroup) \
                        --name $(aksClusterName) \
                        --overwrite-existing

                - task: AzureCLI@2
                  displayName: 'Crear namespace QA (si no existe)'
                  inputs:
                    azureSubscription: 'SCDeploy'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      kubectl get namespace $(k8sNamespaceQA) || \
                      kubectl create namespace $(k8sNamespaceQA)

                - task: AzureCLI@2
                  displayName: 'Helm upgrade --install servicedemo (QA)'
                  inputs:
                    azureSubscription: 'SCDeploy'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      helm upgrade --install $(helmReleaseName) $(helmChartPath) \
                        --namespace $(k8sNamespaceQA) \
                        --set namespace=$(k8sNamespaceQA) \
                        --set api.image.tag=$(imageTag) \
                        --set api.image.registry=$(acrLoginServer) \
                        --set api.env.aspnetcoreEnvironment=QA \
                        --set service.lb.port=$(k8sPortQA) \
                        --set service.lb.port=81 \
                        --set service.lb.azurePipName="d8db1f2b-1c22-4236-824c-d4a28c4a7c2b" \
                        --set service.lb.azureResourceGroup="MC_miPrimerk8s-rg_MiPrimerAks-aks_centralus"
                        --set hpa.minReplicas=1 \
                        --atomic \
                        --timeout 6m \
                        --wait

                      echo "✅ Deploy QA completado. Estado del release:"
                      helm status $(helmReleaseName) -n $(k8sNamespaceQA)

                - task: AzureCLI@2
                  displayName: 'Diagnóstico si falla el deploy a QA'
                  condition: failed()    # ← Solo si el paso anterior falló
                  inputs:
                    azureSubscription: 'SCDeploy'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "🔍 Pods en namespace $(k8sNamespaceQA):"
                      kubectl get pods -n $(k8sNamespaceQA) -o wide

                      echo ""
                      echo "📋 Eventos del namespace:"
                      kubectl get events -n $(k8sNamespaceQA) --sort-by=.lastTimestamp | tail -n 20

                      echo ""
                      echo "📜 Descripción de los pods:"
                      kubectl describe pods -n $(k8sNamespaceQA)

                      echo ""
                      echo "📑 Logs (si los hay):"
                      kubectl logs -n $(k8sNamespaceQA) \
                        -l app=$(helmReleaseName) \
                        --tail=100 || echo "No hay logs aún"

                - task: AzureCLI@2
                  displayName: 'Verificar pods en QA'
                  inputs:
                    azureSubscription: 'SCDeploy'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "📦 Pods en namespace $(k8sNamespaceQA):"
                      kubectl get pods -n $(k8sNamespaceQA)

                      echo ""
                      echo "🌐 Servicios:"
                      kubectl get service -n $(k8sNamespaceQA)

                      echo ""
                      echo "📋 Historial de releases Helm:"
                      helm history $(helmReleaseName) -n $(k8sNamespaceQA)

  # ============================================================
  # STAGE 4: DEPLOY A PROD (rama main - aprobación manual)
  # ============================================================
  - stage: DeployProduction
    displayName: '🚀 Deploy a PROD (Helm)'
    dependsOn: DeployQA
    condition: succeeded()
    jobs:
      - deployment: HelmDeployProd
        displayName: 'Helm upgrade --install (PROD)'
        # Aprobación manual configurada en Azure DevOps
        environment: 'Production'  
        strategy:
          runOnce:
            deploy:
              steps:

                - checkout: self

                - task: CmdLine@2
                  displayName: 'Instalar Helm (si no existe)'
                  inputs:
                    script: |
                      if ! command -v helm &> /dev/null; then
                        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
                      fi
                      helm version

                - task: AzureCLI@2
                  displayName: 'Obtener credenciales AKS'
                  inputs:
                    azureSubscription: 'SCDeploy'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group $(aksResourceGroup) \
                        --name $(aksClusterName) \
                        --overwrite-existing

                - task: AzureCLI@2
                  displayName: 'Crear namespace PROD (si no existe)'
                  inputs:
                    azureSubscription: 'SCDeploy'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      kubectl get namespace $(k8sNamespaceProd) || \
                      kubectl create namespace $(k8sNamespaceProd)

                - task: AzureCLI@2
                  displayName: 'Helm upgrade --install servicedemo (PROD)'
                  inputs:
                    azureSubscription: 'SCDeploy'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      helm upgrade --install $(helmReleaseName) $(helmChartPath) \
                        --namespace $(k8sNamespaceProd) \
                        --set namespace=$(k8sNamespaceProd) \
                        --set api.image.tag=$(imageTag) \
                        --set api.image.registry=$(acrLoginServer) \
                        --set api.env.aspnetcoreEnvironment=Production \
                        --atomic \
                        --timeout 5m \
                        --wait

                      echo "✅ Deploy PROD completado. Estado del release:"
                      helm status $(helmReleaseName) -n $(k8sNamespaceProd)

                - task: AzureCLI@2
                  displayName: 'Verificar pods en PROD'
                  inputs:
                    azureSubscription: 'SCDeploy'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "📦 Pods en namespace $(k8sNamespaceProd):"
                      kubectl get pods -n $(k8sNamespaceProd)

                      echo ""
                      echo "🌐 Servicios:"
                      kubectl get service -n $(k8sNamespaceProd)

                      echo ""
                      echo "📋 Historial de releases Helm:"
                      helm history $(helmReleaseName) -n $(k8sNamespaceProd)
